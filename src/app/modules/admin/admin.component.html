<div class="admin-container">
  <!-- Sidebar Navigation -->
  <div class="admin-sidebar" [class.collapsed]="!showSidebar">
    <div class="sidebar-header">
      <h2>🌱 Beanstalk</h2>
      <button (click)="toggleSidebar()" class="toggle-btn">
        {{ showSidebar ? '◀' : '▶' }}
      </button>
    </div>

    <nav class="sidebar-nav">
      <div class="sidebar-section">
        <div class="section-label" *ngIf="showSidebar">Navigation</div>
        <ng-container *ngFor="let item of sidebarItems">
          <a
            *ngIf="isItemVisible(item.permission)"
            [routerLink]="item.path"
            routerLinkActive="active"
            class="nav-item"
            [title]="item.label"
          >
            <span class="nav-emoji">{{ item.emoji }}</span>
            <span class="nav-label" *ngIf="showSidebar">{{ item.label }}</span>
          </a>
        </ng-container>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info" *ngIf="adminUser && showSidebar">
        <div class="user-avatar">{{ adminUser.admin_fullname.charAt(0) }}</div>
        <div class="user-details">
          <div class="user-name">{{ adminUser.admin_fullname }}</div>
          <div class="user-role">{{ getRoleName() }}</div>
        </div>
      </div>
      <button (click)="logout()" class="logout-btn" [title]="'Logout'">
        <span class="nav-emoji">🚪</span>
        <span *ngIf="showSidebar">Logout</span>
      </button>
    </div>
  </div>

  <!-- Main Content Area -->
  <div class="admin-content">
    <div class="content-body">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
