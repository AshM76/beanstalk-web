<p-scrollPanel [style]="{width: '100%', height: '48vh'}">
    <p-fieldset legend="Store Information">
        <form [formGroup]="dispensaryStoreForm">
            <div class="grid">

                <div class="col-12 ml-2" style="padding: 0%;">
                    <p><i>Please enter information for your main location. Once signup is complete, you can add
                            additionallocations in your Profile.</i></p>
                </div>

                <div class="col-12 md:col-6 lg:col-6"
                    style="display: flex; flex-direction: column; align-items: flex-start;">

                    <!-- Store Name -->
                    <div class="p-inputgroup" style="margin-top: 15px;">
                        <span class="p-inputgroup-addon">
                            <i class="pi pi-briefcase"></i>
                        </span>
                        <span class="p-float-label">
                            <input pInputText type="text" class="mr-2" formControlName="store_name">
                            <label for="inputgroup">Store Name</label>
                        </span>
                    </div>

                    <span style="margin-top: 5px;">
                        <p-message severity="error" [style]="{height: '20px'}" class="mr-2"
                            *ngIf="(dispensaryStoreForm.controls['store_name'].errors?.['required'] && dispensaryStoreForm.controls['store_name'].touched)"
                            text="Name is required"></p-message>
                    </span>
                    <!-- End Store Name -->

                    <!-- Store Description -->
                    <div class="p-inputgroup" style="margin-top: 25px;">
                        <span class="p-inputgroup-addon">
                            <i class="pi pi-book"></i>
                        </span>
                        <span class="p-float-label">
                            <input pInputText type="text" class="mr-2" formControlName="store_description">
                            <label for="inputgroup">Store Description</label>
                        </span>
                    </div>
                    <!-- End Store Description -->

                    <!-- Phone -->
                    <div class="p-inputgroup" style="margin-top: 25px;">
                        <span class="p-inputgroup-addon">
                            <i class="pi pi-phone"></i>
                        </span>
                        <span class="p-float-label">
                            <input pInputText type="num" pKeyFilter="num" class="mr-2" formControlName="store_phone">
                            <label for="inputgroup">Phone Contact</label>
                        </span>
                    </div>
                    <!-- End Phone -->

                    <!-- Email -->
                    <div class="p-inputgroup" style="margin-top: 25px;">
                        <span class="p-inputgroup-addon">
                            <i class="pi pi-at"></i>
                        </span>
                        <span class="p-float-label">
                            <input pInputText type="text" class="mr-2" formControlName="store_email">
                            <label for="inputgroup">Email Contact</label>
                        </span>
                    </div>
                    <!-- End Email -->

                </div>

                <div class="col-12 md:col-6 lg:col-6"
                    style="display: flex; flex-direction: column; align-items: flex-end;">

                    <!-- Address Line 1 -->
                    <div class="p-inputgroup" style="margin-top: 15px;">
                        <span class="p-inputgroup-addon">
                            <i class="pi pi-map-marker"></i>
                        </span>
                        <span class="p-float-label">
                            <input pInputText type="text" class="mr-2" formControlName="store_addressLine1">
                            <label for="inputgroup">Address Line 1</label>
                        </span>
                    </div>

                    <span style="margin-top: 5px;">
                        <p-message severity="error" [style]="{height: '20px'}" class="mr-2"
                            *ngIf="(dispensaryStoreForm.controls['store_addressLine1'].errors?.['required'] && dispensaryStoreForm.controls['store_addressLine1'].touched)"
                            text="Address Line 1 is required">
                        </p-message>
                    </span>
                    <!-- End Address Line 1 -->

                    <!-- Address Line 2 -->
                    <div class="p-inputgroup" style="margin-top: 25px;">
                        <span class="p-inputgroup-addon">
                            <i class="pi pi-map-marker"></i>
                        </span>
                        <span class="p-float-label">
                            <input pInputText type="text" class="mr-2" formControlName="store_addressLine2">
                            <label for="inputgroup">Address Line 2</label>
                        </span>
                    </div>
                    <!-- End Address Line 2 -->

                    <!-- City -->
                    <div class="p-inputgroup" style="margin-top: 25px;">
                        <span class="p-inputgroup-addon">
                            <i class="pi pi-map-marker"></i>
                        </span>
                        <span class="p-float-label">
                            <input pInputText type="text" class="mr-2" formControlName="store_city">
                            <label for="inputgroup">City</label>
                        </span>
                    </div>

                    <span style="margin-top: 5px;">
                        <p-message severity="error" [style]="{height: '20px'}" class="mr-2"
                            *ngIf="(dispensaryStoreForm.controls['store_city'].errors?.['required'] && dispensaryStoreForm.controls['store_city'].touched)"
                            text="City is required"></p-message>
                    </span>
                    <!-- End City -->

                    <!-- State -->
                    <div class="p-inputgroup" style="margin-top: 25px;">
                        <span class="p-inputgroup-addon">
                            <i class="pi pi-map-marker"></i>
                        </span>
                        <span class="p-float-label">
                            <p-dropdown [autoDisplayFirst]="false" placeholder="Select a State" [options]="states"
                                formControlName="store_state" [required]="true" [showClear]="true">
                            </p-dropdown>
                        </span>
                    </div>

                    <span style="margin-top: 5px;">
                        <p-message severity="error" [style]="{height: '20px'}" class="mr-2"
                            *ngIf="(dispensaryStoreForm.controls['store_state'].errors?.['required'] && dispensaryStoreForm.controls['store_state'].touched)"
                            text="State is required"></p-message>
                    </span>
                    <!-- End State -->

                    <!-- Zip -->
                    <div class="p-inputgroup" style="margin-top: 25px;">
                        <span class="p-inputgroup-addon">
                            <i class="pi pi-map-marker"></i>
                        </span>
                        <span class="p-float-label">
                            <input pInputText type="text" class="mr-2" formControlName="store_zip">
                            <label for="inputgroup">Zip</label>
                        </span>
                    </div>

                    <span style="margin-top: 5px;">
                        <p-message severity="error" [style]="{height: '20px'}" class="mr-2"
                            *ngIf="(dispensaryStoreForm.controls['store_zip'].errors?.['required'] && dispensaryStoreForm.controls['store_zip'].touched)"
                            text="Zip is required"></p-message>
                    </span>
                    <!-- End Zip -->

                </div>
                <div class="col-12"
                    style="display: flex; flex-direction: column; align-items: flex-start; margin-top: 10px;">
                    <p><i class="pi pi-clock"></i> Hours:</p>
                </div>

                <div class="grid w-full ml-2" style="flex-direction: column;" formArrayName="store_hours">

                    <div *ngFor="let storeHour of dispensaryStoreOpenHours.controls; let i = index;"
                        class="col-12 mt-1 p-0">

                        <div class="grid" style="align-items: center;" [formGroupName]="i">

                            <div class="col-6 md:col-6 lg:col-1 p-0" style="display: flex; justify-content: right;">
                                <p class="mt-3">{{ storeHour.value.day }}</p>
                            </div>

                            <div class="col-6 md:col-6 lg:col-1" style="display: flex; justify-content: center;">
                                <p-inputSwitch class="mt-1 mr-3" formControlName="selected_day"
                                    (onChange)="handleStoreOpenHourChange($event.checked, i)"></p-inputSwitch>
                            </div>

                            <div class="col-12 md:col-5 lg:col-2 p-0"
                                style="display: flex; flex-direction: column; align-items: center; justify-content: center;">

                                <p-calendar [timeOnly]="true" [hourFormat]="'12'" [showIcon]="true" icon="pi pi-clock"
                                    [readonlyInput]="false" formControlName="opensAt"></p-calendar>

                                <span style="margin-top: 5px;">
                                    <p-message severity="error" [style]="{height: '20px'}" class="mr-2"
                                        *ngIf="(dispensaryStoreOpenHours.controls[i].get('opensAt')?.errors?.['required'] && dispensaryStoreOpenHours.controls[i].get('opensAt')?.touched)"
                                        text="Opens at is required"></p-message>
                                </span>
                            </div>

                            <div class="col-12 md:col-2 lg:col-1 p-0" style="display: flex; justify-content: center;">
                                <p class="mt-3">to</p>
                            </div>

                            <div class="col-12 md:col-5 lg:col-2 p-0"
                                style="display: flex; flex-direction: column; align-items: center; justify-content: center;">

                                <p-calendar [timeOnly]="true" [hourFormat]="'12'" [showIcon]="true" icon="pi pi-clock"
                                    [readonlyInput]="false" formControlName="closesAt"></p-calendar>
                                <p-message severity="error" [style]="{height: '20px'}" class="mr-2"
                                    *ngIf="(dispensaryStoreOpenHours.controls[i].get('closesAt')?.errors?.['required'] && dispensaryStoreOpenHours.controls[i].get('closesAt')?.touched)"
                                    text="Closes at is required"></p-message>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </p-fieldset>
</p-scrollPanel>

<div class="grid">
    <div class="col-6">
        <button pButton type="button"
            [style]="{height: '50px', width: '50%', background: '#FFFFFF', color: '#66CBE3' , border: 'none'}"
            label="Back" icon="pi pi-angle-left" iconPos="left" (click)="backPage()">
        </button>
    </div>
    <div class="col-6">
        <button pButton type="button" [style]="{height: '50px', width: '100%', background: '#E19A3D', border: 'none'}"
            [disabled]="!(dispensaryStoreForm.valid)" label="Continue" icon="pi pi-angle-right" iconPos="right"
            (click)="nextPage()">
        </button>
    </div>
</div>
