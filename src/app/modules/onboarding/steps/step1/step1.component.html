<p-scrollPanel [style]="{width: '100%', height: '40vh'}">
    <p-fieldset legend="Dispensary Information">
        <div class="grid">
            <div class="col-12 md:col-6 lg:col-6"
                style="display: flex; flex-direction: column; align-items: flex-start;">
                <form [formGroup]="dispensaryInformationForm" class="w-100">
                    <div class="p-inputgroup">
                        <span class="p-inputgroup-addon">
                            <i class="pi pi-briefcase"></i>
                        </span>
                        <span class="p-float-label">
                            <input pInputText type="text" class="mr-2" formControlName="dispensary_name">
                            <label for="inputgroup">Dispensary Name</label>
                        </span>
                    </div>

                    <span style="margin-top: 5px;">
                        <p-message severity="error" [style]="{height: '20px'}" class="mr-2"
                            *ngIf="(dispensaryInformationForm.controls['dispensary_name'].errors?.['required'] && dispensaryInformationForm.controls['dispensary_name'].touched)" 
                            text="Name is required"></p-message>
                    </span>

                    <div class="p-inputgroup" style="margin-top: 25px;">
                        <span class="p-inputgroup-addon">
                            <i class="pi pi-book"></i>
                        </span>
                        <span class="p-float-label">
                            <input pInputText type="text" class="mr-2" formControlName="dispensary_description">
                            <label for="inputgroup">Description</label>
                        </span>
                    </div>

                    <span style="margin-top: 5px;">
                        <p-message severity="error" [style]="{height: '20px'}" class="mr-2"
                            *ngIf="(dispensaryInformationForm.controls['dispensary_description'].errors?.['required'] && dispensaryInformationForm.controls['dispensary_description'].touched)"
                            text="Description is required"></p-message>
                    </span>

                    <div class="p-inputgroup" style="margin-top: 25px;">
                        <span class="p-inputgroup-addon">
                            <i class="pi pi-hashtag"></i>
                        </span>
                        <span class="p-float-label">
                            <input pInputText type="text" class="mr-2" formControlName="license_number">
                            <label for="inputgroup">License #</label>
                        </span>
                    </div>
                </form>
            </div>
            <div class="col md:col-6 lg:col-6"></div>

        </div>
    </p-fieldset>
</p-scrollPanel>

<div class="grid">
    <div class="col-6">
        <button pButton type="button"
            [style]="{height: '50px', width: '50%', background: '#FFFFFF', color: '#66CBE3' , border: 'none'}"
            label="Back" icon="pi pi-angle-left" iconPos="left" (click)="backPage()">
        </button>
    </div>
    <div class="col-6">
        <button pButton type="button" [style]="{height: '50px', width: '100%', background: '#E19A3D', border: 'none'}"
            label="Continue" icon="pi pi-angle-right" iconPos="right"
            [disabled]="!(dispensaryInformationForm.valid)" (click)="nextPage()">
        </button>
    </div>
</div>
