<p-toolbar class="ml-4 mr-4">
    <div class="p-toolbar-group-left">
        <label style="font-size:18px; font-weight: 500;">Dispensary Store Detail</label>
    </div>
    <div class="p-toolbar-group-right">
        <p-button label="Back" icon="pi pi-arrow-circle-left" class="mr-2" [routerLink]="['/dispensary/stores']">
        </p-button>
        <p-button *authorized="'edit'" label="Edit" icon="pi pi-pencil" class="mr-2"
            [routerLink]="['/dispensary/stores/' + store.store_id + '/edit']"
            [style]="{'background': '#E19A3D', 'color': '#F8FAFC', 'border-color': '#E19A3D'}">
        </p-button>
    </div>
</p-toolbar>

<div class="grid">
    <p-card class="col-12">
        <p-scrollPanel [style]="{width: '100%', height: '55vh'}">
            <div class="grid">
                <div class="grid w-100 ">

                    <div class="grid col-12">

                        <div class="col-3 flex justify-content-end align-items-center">
                            <p-image *ngIf="!(store.store_photos.length > 0)" src="/assets/deal-default.png" alt="Image" width="250"
                                [imageStyle]="{'border-radius':'25px'}"></p-image>

                            <p-image *ngIf="(store.store_photos.length > 0)" [src]="store.store_photos[0].photo_url"
                                alt="Image" width="250" [imageStyle]="{'border-radius':'25px'}"></p-image>
                        </div>

                        <div class="col-9 flex flex-column">
                            <div class="col-12 flex flex-row">

                                <div class="col-4 flex flex-column">
                                    <label class="text-800 w-6 md:w-6 ml-2" style="font-size:13px;">Store Name</label>
                                    <label class="yLabel" style="padding: 0.75rem;"> {{store.store_name}}
                                        &nbsp;</label>
                                </div>

                                <div class="col-6 flex flex-column">
                                    <label class="text-800 w-6 md:w-6 ml-2" style="font-size:13px;">Store
                                        Description</label>
                                    <label class="yLabel" style="padding: 0.75rem;"> {{store.store_description}}
                                        &nbsp;</label>
                                </div>
                                <div class="col-2 flex flex-column">
                                    <label class="text-800 w-6 md:w-6 ml-2" style="font-size:13px;">Available</label>
                                    <p-chip [label]="store.store_available ? 'Available': 'Not Available'"
                                        styleClass="mr-2 custom-chip"></p-chip>
                                </div>

                            </div>

                            <div class="col-12 flex flex-row">

                                <div class="col-5 flex flex-column">
                                    <label class="text-800 w-6 md:w-6 ml-2" style="font-size:13px;">Phone
                                        Contact</label>
                                    <label class="yLabel" style="padding: 0.75rem;"> {{store.store_phone}}
                                        &nbsp;</label>
                                </div>

                                <div class="col-7 flex flex-column">
                                    <label class="text-800 w-6 md:w-6 ml-2" style="font-size:13px;">Email
                                        Contact</label>
                                    <label class="yLabel" style="padding: 0.75rem;"> {{store.store_email}}
                                        &nbsp;</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-12 md:col-6 lg:col-6 w-100"
                        style="display: flex; flex-direction: column; align-items: flex-start;">

                        <div class="col-12 flex flex-row">
                            <div class="col-6 flex flex-column">
                                <label class="text-800 w-6 md:w-6 ml-2" style="font-size:13px;">Address Line
                                    1</label>
                                <label class="yLabel" style="padding: 0.75rem;"> {{store.store_addressLine1}}
                                    &nbsp;</label>
                            </div>

                            <div class="col-6 flex flex-column">
                                <label class="text-800 w-6 md:w-6 ml-2" style="font-size:13px;">Address Line
                                    2</label>
                                <label class="yLabel" style="padding: 0.75rem;"> {{store.store_addressLine2}}
                                    &nbsp;</label>
                            </div>
                        </div>

                        <div class="col-12 flex flex-row">
                            <div class="col-5 flex flex-column">
                                <label class="text-800 w-6 md:w-2 ml-2" style="font-size:13px;">City</label>
                                <label class="yLabel" style="padding: 0.75rem;"> {{store.store_city}} &nbsp;</label>
                            </div>

                            <div class="col-5 flex flex-column">
                                <label class="text-800 w-6 md:w-2 ml-2" style="font-size:13px;">State</label>
                                <label class="yLabel" style="padding: 0.75rem;"> {{store.store_state}} &nbsp;</label>
                            </div>

                            <div class="col-2 flex flex-column">
                                <label class="text-800 w-6 md:w-2 ml-2" style="font-size:13px;">Zip</label>
                                <label class="yLabel" style="padding: 0.75rem;"> {{store.store_zip}} &nbsp;</label>
                            </div>
                        </div>
                    </div>

                    <div class="col-12 md:col-6 lg:col-6 w-100"
                        style="display: flex; flex-direction: column; align-items: flex-start;">
                        <div class="col-12"
                            style="display: flex; flex-direction: column; align-items: flex-start; margin-top: 10px;">
                            <p><i class="pi pi-link"></i> Social Media:</p>
                        </div>

                        <div class="col-12 flex flex-column">
                            <div class="col-12 flex flex-column">
                                <label class="text-800 w-6 md:w-6 ml-2" style="font-size:13px;">Website</label>
                                <label class="yLabel" style="padding: 0.75rem;"> {{store.store_website}} &nbsp;</label>
                            </div>
                        </div>

                        <div class="col-12 flex flex-row">
                            <div class="col-6 flex flex-column">
                                <label class="text-800 w-6 md:w-6 ml-2" style="font-size:13px;">Facebook</label>
                                <label class="yLabel" style="padding: 0.75rem;"> {{store.store_facebook}}
                                    &nbsp;</label>
                            </div>

                            <div class="col-6 flex flex-column">
                                <label class="text-800 w-6 md:w-6 ml-2" style="font-size:13px;">Instagram</label>
                                <label class="yLabel" style="padding: 0.75rem;"> {{store.store_instagram}}
                                    &nbsp;</label>
                            </div>
                        </div>

                        <div class="col-12 flex flex-row">
                            <div class="col-6 flex flex-column">
                                <label class="text-800 w-6 md:w-6 ml-2" style="font-size:13px;">Twitter</label>
                                <label class="yLabel" style="padding: 0.75rem;"> {{store.store_twitter}}
                                    &nbsp;</label>
                            </div>

                            <div class="col-6 flex flex-column">
                                <label class="text-800 w-6 md:w-6 ml-2" style="font-size:13px;">Youtube</label>
                                <label class="yLabel" style="padding: 0.75rem;"> {{store.store_youtube}}
                                    &nbsp;</label>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 md:col-6 lg:col-6 w-100"
                        style="display: flex; flex-direction: column; align-items: flex-start;">
                        <div class="col-12"
                            style="display: flex; flex-direction: column; align-items: flex-start; margin-top: 10px;">
                            <p><i class="pi pi-clock"></i> Hours:</p>
                        </div>

                        <div class="grid w-full ml-2" style="flex-direction: column;">

                            <div *ngFor="let storeHour of store.store_hours; let i = index;" class="col-12 mt-1 p-0">

                                <div class="grid mb-1" style="align-items: center;">

                                    <div class="col-6 md:col-6 lg:col-2 p-0"
                                        style="display: flex; justify-content: right;">
                                        <p class="mt-3">{{ storeHour.day }}</p>
                                    </div>

                                    <div class="col-12 md:col-5 lg:col-2 p-0"
                                        style="display: flex; flex-direction: row; align-items: center; justify-content: center;">
                                        <label class="yLabel" style="padding: 0.75rem; width: 115px;">
                                            {{storeHour.opensAt}} &nbsp;</label>
                                    </div>

                                    <div class="col-12 md:col-2 lg:col-1 p-0"
                                        style="display: flex; justify-content: center;">
                                        <p class="mt-3">to</p>
                                    </div>

                                    <div class="col-12 md:col-5 lg:col-2 p-0"
                                        style="display: flex; flex-direction: row; align-items: center; justify-content: center;">
                                        <label class="yLabel" style="padding: 0.75rem; width: 115px;">
                                            {{storeHour.closesAt}} &nbsp;</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </p-scrollPanel>
    </p-card>
</div>
